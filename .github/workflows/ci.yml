name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: build · smoke (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (editable)
        run: pip install -e .[dev]

      - name: Byte-compile the package
        run: python -m compileall -q bubblepwn

      - name: Console script on PATH
        run: |
          which bubblepwn
          bubblepwn --version

      - name: Module registry + grouped listing
        env:
          PYTHONIOENCODING: utf-8
        run: bubblepwn modules

      - name: Help and flow preset docs
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -c "from bubblepwn.shell import _render_help, _render_flow_help; _render_help(); _render_flow_help()"

      - name: Crypto round-trip (offline)
        run: |
          python - <<'PY'
          import json
          from bubblepwn.bubble.es import crypto
          appname = "ci-smoke"
          payload = json.dumps({"type": "custom.test", "n": 1}).encode()
          triple = crypto.wrap_triple(appname, payload)
          ts, iv, pt = crypto.unwrap_triple(appname, triple)
          assert pt == payload, "crypto round-trip failed"
          print("crypto round-trip ok — triple:", list(triple.keys()))
          PY

      - name: Unit tests (pytest)
        run: pytest tests/ -q

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff>=0.5
      - run: ruff check bubblepwn/ --output-format=github
